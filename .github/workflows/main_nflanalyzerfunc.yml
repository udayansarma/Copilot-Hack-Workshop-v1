name: Build and deploy Python project to Azure Function App - nflanalyzerfunc

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: 'nflanalyzerfunc'
  PYTHON_VERSION: '3.13'
  RESOURCE_GROUP: 'nfl-clause-checker-rg'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Install Python packages locally so they are bundled in the zip.
      # Flex Consumption has no Kudu/SCM site, so we do a local pip install
      # into .python_packages/lib/site-packages/ — the standard Azure Functions
      # path that the Python worker puts on sys.path.
      #
      # IMPORTANT: Use --platform manylinux2014_x86_64 --only-binary :all:
      # to force manylinux-compatible wheels.  Packages like cryptography,
      # numpy and scikit-learn have C extensions; wheels compiled natively on
      # ubuntu-latest (glibc 2.39) cannot be loaded by the Flex Consumption
      # Python 3.11 runtime (Debian Bullseye, glibc 2.31).  manylinux2014
      # wheels target glibc 2.17+ and run on every supported Linux runtime.
      - name: Install Python packages for deployment
        run: |
          pip install \
            --target .python_packages/lib/site-packages/ \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.13 \
            --only-binary :all: \
            --upgrade \
            -r requirements.txt

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A7B31E66D86440FEA70406129E5C6C8B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1EC9F1785D6C4532B3181C32885304B5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_76095BE0D68D4CF08D8AB07954D03338 }}

      # EnableWorkerIndexing is required for the Python v2 programming model
      # (decorator-based functions in function_app.py) to be discovered by the
      # runtime.  Setting it before deploy avoids a post-deploy restart race.
      - name: Ensure v2 worker indexing is enabled
        run: |
          az functionapp config appsettings set \
            --name "${{ env.AZURE_FUNCTIONAPP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --settings AzureWebJobsFeatureFlags=EnableWorkerIndexing
          echo "Waiting 30s for settings to apply..."
          sleep 30

      # azure/functions-action@v1 misdetects Flex Consumption as plain
      # "Consumption" and sets WEBSITE_RUN_FROM_PACKAGE, which Flex Consumption
      # ignores.  Remove any stale value so the runtime reads exclusively from
      # the deployment container configured in functionAppConfig.
      - name: Remove stale WEBSITE_RUN_FROM_PACKAGE
        run: |
          az functionapp config appsettings delete \
            --name "${{ env.AZURE_FUNCTIONAPP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --setting-names WEBSITE_RUN_FROM_PACKAGE 2>/dev/null || true

      # func azure functionapp publish is the officially supported deployment
      # method for Flex Consumption.  It uploads the zip, registers the
      # specific blob URL with the runtime, and triggers a reload.
      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Deploy to Azure Functions
        run: |
          FUNC_APP="${{ env.AZURE_FUNCTIONAPP_NAME }}"
          RG="${{ env.RESOURCE_GROUP }}"
          SUB_ID=$(az account show --query id -o tsv)

          # ── A. Try func azure functionapp publish (official Flex Consumption tool)
          echo "=== Attempting func azure functionapp publish ==="
          FUNC_CMD_LOG=/tmp/func_publish.log
          if func azure functionapp publish "$FUNC_APP" --python --no-build 2>&1 | tee "$FUNC_CMD_LOG"; then
            echo "func publish succeeded!"
            DEPLOYED_VIA_FUNC=true
          else
            echo "func publish failed — falling back to blob upload + PATCH..."
            cat "$FUNC_CMD_LOG" || true
            DEPLOYED_VIA_FUNC=false
          fi

          # ── B. Fallback: blob upload + ARM PATCH ──────────────────────────────
          # Reads the storage account and container from the app's current
          # functionAppConfig so this step works regardless of which container
          # name was chosen when the app was provisioned.
          if [ "$DEPLOYED_VIA_FUNC" = "false" ]; then

            CONTAINER_VALUE=$(az rest --method get \
              --uri "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.Web/sites/${FUNC_APP}?api-version=2023-12-01" \
              --query "properties.functionAppConfig.deployment.storage.value" -o tsv)
            echo "Deployment storage value: $CONTAINER_VALUE"

            ACCOUNT_NAME=$(echo "$CONTAINER_VALUE" | sed 's|https://||' | cut -d. -f1)
            CONTAINER_NAME=$(echo "$CONTAINER_VALUE" | sed 's|.*/||')
            echo "Storage account: $ACCOUNT_NAME  Container: $CONTAINER_NAME"

            # ── B1. Build deployment zip ────────────────────────────────────────
            echo "Building deployment zip..."
            zip -r /tmp/deploy.zip . \
              --exclude ".git*" \
              --exclude ".github/*" \
              --exclude ".venv*" \
              --exclude "__pycache__/*" \
              --exclude "*.pyc" \
              --exclude "local.settings.json" \
              --exclude ".env" \
              --exclude ".env.*" \
              --exclude "IaC/*" \
              --exclude "*.zip" \
              --exclude "*.log"
            echo "Zip size: $(du -sh /tmp/deploy.zip | cut -f1)"

            # ── B2. Upload zip using AAD (OIDC) credentials ─────────────────────
            echo "Uploading deploy.zip to ${CONTAINER_NAME} container..."
            az storage blob upload \
              --account-name "$ACCOUNT_NAME" \
              --auth-mode login \
              --container-name "$CONTAINER_NAME" \
              --name "deploy.zip" \
              --file /tmp/deploy.zip \
              --overwrite

            # ── B3. PATCH to specific blob URL with SystemAssignedIdentity ──────
            # The Flex Consumption runtime requires the storage.value to point to
            # a specific blob URL (not just the container URL) to know which
            # package to download.  SystemAssignedIdentity matches the auth type
            # already configured in the portal deployment settings.
            BLOB_URL="https://${ACCOUNT_NAME}.blob.core.windows.net/${CONTAINER_NAME}/deploy.zip"
            echo "Patching functionAppConfig.deployment.storage to: $BLOB_URL"
            az rest --method patch \
              --uri "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.Web/sites/${FUNC_APP}?api-version=2023-12-01" \
              --headers "Content-Type=application/json" \
              --body "{
                \"properties\": {
                  \"functionAppConfig\": {
                    \"deployment\": {
                      \"storage\": {
                        \"type\": \"blobContainer\",
                        \"value\": \"${BLOB_URL}\",
                        \"authentication\": {
                          \"type\": \"SystemAssignedIdentity\"
                        }
                      }
                    },
                    \"scaleAndConcurrency\": {
                      \"maximumInstanceCount\": 100,
                      \"instanceMemoryMB\": 2048
                    },
                    \"runtime\": {
                      \"name\": \"python\",
                      \"version\": \"3.13\"
                    }
                  }
                }
              }"

            UPDATED_VALUE=$(az rest --method get \
              --uri "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.Web/sites/${FUNC_APP}?api-version=2023-12-01" \
              --query "properties.functionAppConfig.deployment.storage.value" -o tsv)
            echo "Deployment storage value is now: $UPDATED_VALUE"
          fi

          # ── Restart and sync ──────────────────────────────────────────────────
          echo "Restarting function app to pick up new deployment..."
          az functionapp restart \
            --name "$FUNC_APP" \
            --resource-group "$RG"
          echo "Restart issued. Waiting 90s for the app to come back up..."
          sleep 90

          echo "Syncing function triggers..."
          az rest --method post \
            --uri "https://management.azure.com/subscriptions/${SUB_ID}/resourceGroups/${RG}/providers/Microsoft.Web/sites/${FUNC_APP}/syncfunctiontriggers?api-version=2023-12-01" \
            --output none || true
          echo "Sync issued. Waiting 30s..."
          sleep 30

      - name: Health check
        run: |
          FUNC_URL="https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net/api/health"
          echo "Waiting 120s for Flex Consumption cold start..."
          sleep 120
          echo "Starting health check..."
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FUNC_URL")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting 30s..."
            sleep 30
          done
          # ── Diagnostics on failure ────────────────────────────────────────────
          echo "=== Response body ==="
          curl -s "$FUNC_URL" || true
          echo ""
          echo "=== Registered functions ==="
          az functionapp function list \
            --name "${{ env.AZURE_FUNCTIONAPP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            -o json 2>&1 || true
          echo "=== Relevant app settings ==="
          az functionapp config appsettings list \
            --name "${{ env.AZURE_FUNCTIONAPP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "[?name=='WEBSITE_RUN_FROM_PACKAGE' || name=='AzureWebJobsFeatureFlags' || name=='FUNCTIONS_WORKER_RUNTIME'].{name:name,value:value}" \
            -o table 2>&1 || true
          echo "Health check failed after 20 attempts"
          exit 1
          